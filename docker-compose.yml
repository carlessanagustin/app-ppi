services:
  ollama:
    image: ollama/ollama:0.23.0
    restart: unless-stopped
    container_name: ollama
    healthcheck:
      test: [ "CMD", "/bin/bash", "-c", "cat < /dev/null > /dev/tcp/localhost/11434" ]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    ports:
      - "11434:11434"
    volumes:
      - ./data-ollama:/root/.ollama
    networks:
      - ollama-net

  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.9.2
    restart: unless-stopped
    container_name: open-webui
    ports:
      - "8080:8080"
    volumes:
      - ./data-openwebui:/app/backend/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080" ]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    depends_on:
      - ollama
    networks:
      - ollama-net
      - presidio-net
      - chroma-net
    environment:
      GLOBAL_LOG_LEVEL: WARNING
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_NAME: My Own AIChat
      WEBUI_SECRET_KEY: t0p-s3cr3t
      WEBUI_AUTH: "False"
      ENABLE_WEB_SEARCH: "true"
      WEB_SEARCH_ENGINE: serpapi
      SERPAPI_API_KEY: ${SERPAPI_API_KEY}
      SERPAPI_ENGINE: google
      VECTOR_DB: chroma
      CHROMA_HTTP_HOST: chromadb
      CHROMA_HTTP_PORT: "8000"
      MILVUS_URI: http://milvus-standalone:19530
      MILVUS_DB: default
      MILVUS_TOKEN: root:Milvus

  lobe-chat:
    image: lobehub/lobe-chat:1.143.3
    container_name: lobe-chat
    restart: unless-stopped
    depends_on:
      - ollama
    networks:
      - ollama-net
      - presidio-net
      - chroma-net
    ports:
      - "3210:3210"
    healthcheck:
      test:
        [
          "CMD",
          "/bin/node",
          "-e",
          "require('http').get('http://localhost:3210/health', (r) =>
            process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    environment:
      ENABLED_OLLAMA: "1"
      OLLAMA_PROXY_URL: http://ollama:11434

  chromadb:
    image: chromadb/chroma:1.5.9
    container_name: chromadb
    ports:
      - "8000:8000"
    volumes:
      - ./data-chroma:/data
    restart: unless-stopped
    environment:
      - CHROMA_HOST=0.0.0.0
      - CHROMA_PORT=8000
    healthcheck:
      test: [ "CMD", "/bin/bash", "-c", "cat < /dev/null > /dev/tcp/localhost/8000" ]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    networks:
      - chroma-net

  presidio-analyzer:
    image: mcr.microsoft.com/presidio-analyzer:latest
    ports:
      - "5002:3000"
    environment:
      - GRPC_PORT=5001
    networks:
      - presidio-net

  presidio-anonymizer:
    image: mcr.microsoft.com/presidio-anonymizer:latest
    ports:
      - "5001:3000"
    networks:
      - presidio-net

networks:
  chroma-net:
    driver: bridge
  ollama-net:
    driver: bridge
  presidio-net:
    driver: bridge
